<!DOCTYPE html>
<html>
<head>
    <title>SMART Status</title>
    <meta charset="utf-8">
    <link href="../base1/cockpit.css" rel="stylesheet">
    <style>
        body {
            font-family: "RedHatText", "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            color: #151515;
            overflow-x: hidden;
            max-width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 6px 0;
        }

        .subtitle {
            color: #6a6e73;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #06c;
            color: #fff;
            transition: background 0.15s;
        }
        .btn:hover { background: #004080; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn svg { width: 16px; height: 16px; }

        .status-msg {
            font-size: 13px;
            color: #6a6e73;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #6a6e73;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .disk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr));
            gap: 16px;
            max-width: 100%;
        }

        .disk-card {
            background: #fff;
            border: 1px solid #d2d2d2;
            border-radius: 6px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            overflow: hidden;
            min-width: 0;
        }

        .disk-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 8px;
            min-width: 0;
        }

        .disk-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .disk-device {
            font-size: 12px;
            color: #6a6e73;
            margin-top: 2px;
        }

        .health-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        .health-passed {
            background: #e7f5e7;
            color: #1e4620;
        }
        .health-failed {
            background: #fce4e4;
            color: #7d1007;
        }
        .health-unknown {
            background: #f0f0f0;
            color: #6a6e73;
        }

        .disk-type-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            background: #e7f1fa;
            color: #002952;
            margin-left: 8px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2px 12px;
            font-size: 13px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .info-grid dt {
            color: #6a6e73;
            margin: 0;
            white-space: nowrap;
        }
        .info-grid dd {
            margin: 0;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .attr-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #6a6e73;
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .attr-table-wrapper {
            overflow-x: auto;
            margin: 0 -2px;
            padding: 0 2px;
        }
        .attr-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            table-layout: fixed;
        }
        .attr-table th {
            text-align: left;
            padding: 4px 8px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
            color: #6a6e73;
            font-weight: 600;
            white-space: nowrap;
        }
        .attr-table col.col-id { width: 32px; }
        .attr-table col.col-attr { width: auto; }
        .attr-table col.col-num { width: 52px; }
        .attr-table col.col-raw { width: 72px; }
        .attr-table td {
            padding: 3px 8px;
            border-bottom: 1px solid #f5f5f5;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .attr-table td:nth-child(2) {
            white-space: normal;
            word-break: break-all;
        }
        .attr-table tr:hover td {
            background: #fafafa;
        }

        .attr-warn {
            color: #c9190b;
            font-weight: 600;
        }

        .attr-highlight {
            background: #fff3cd !important;
        }

        .nvme-kv {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .nvme-kv-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .nvme-kv-item .kv-label {
            color: #6a6e73;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .nvme-kv-item .kv-value {
            font-weight: 600;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .error-msg {
            padding: 12px;
            background: #fce4e4;
            border: 1px solid #c9190b;
            border-radius: 4px;
            color: #7d1007;
            margin: 20px 0;
        }

        /* Collapsible details */
        .attr-toggle {
            background: none;
            border: none;
            font-size: 13px;
            color: #06c;
            cursor: pointer;
            padding: 4px 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .attr-toggle:hover { text-decoration: underline; }
        .attr-toggle svg {
            width: 12px;
            height: 12px;
            transition: transform 0.2s;
        }
        .attr-toggle.expanded svg {
            transform: rotate(90deg);
        }
        .attr-details {
            display: none;
            margin-top: 6px;
        }
        .attr-details.show {
            display: block;
        }

        /* Trend / changes section */
        .changes-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        .changes-section .attr-section-title {
            margin-bottom: 8px;
        }
        .change-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .change-item:last-child {
            border-bottom: none;
        }
        .change-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
        .change-icon.warn {
            background: #fff3cd;
            color: #856404;
        }
        .change-icon.danger {
            background: #fce4e4;
            color: #c9190b;
        }
        .change-icon.info {
            background: #e7f1fa;
            color: #002952;
        }
        .change-text {
            flex: 1;
            min-width: 0;
        }
        .change-text .attr-name {
            font-weight: 600;
        }
        .change-detail {
            color: #6a6e73;
        }
        .no-changes {
            font-size: 12px;
            color: #6a6e73;
            font-style: italic;
            padding: 4px 0;
        }

        /* Sparklines */
        .sparkline {
            flex-shrink: 0;
        }
        .sparkline polyline {
            fill: none;
            stroke: #06c;
            stroke-width: 1.5;
            stroke-linejoin: round;
            stroke-linecap: round;
        }
        .sparkline circle {
            fill: #06c;
        }
        .sparkline .spark-area {
            fill: rgba(0, 102, 204, 0.08);
            stroke: none;
        }
        .change-icon.danger + .change-text + .sparkline polyline,
        .change-icon.danger + .change-text + .sparkline circle {
            stroke: #c9190b;
            fill: #c9190b;
        }

        /* History status */
        .history-status {
            font-size: 11px;
            color: #6a6e73;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <h1>SMART Diskstatus</h1>
    <p class="subtitle">S.M.A.R.T.-hälsa och attribut för alla anslutna diskar</p>

    <div class="controls">
        <button class="btn" id="refreshBtn" onclick="loadData()">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 8a6 6 0 1 1-1.06-3.39l-1.22 1.22A4.5 4.5 0 1 0 12.5 8H11l2.5-3L16 8h-2z"/></svg>
            Uppdatera
        </button>
        <span class="status-msg" id="statusMsg"></span>
    </div>

    <div id="content"></div>

    <script>
        /* global cockpit */

        // Global history data, loaded once
        var historyData = null;

        // Key SMART attributes to highlight
        var CRITICAL_ATTRS = {
            5:   'Reallocated_Sector_Ct',
            10:  'Spin_Retry_Count',
            184: 'End-to-End_Error',
            187: 'Reported_Uncorrect',
            188: 'Command_Timeout',
            196: 'Reallocated_Event_Count',
            197: 'Current_Pending_Sector',
            198: 'Offline_Uncorrectable',
        };

        var IMPORTANT_ATTRS = {
            1:   'Raw_Read_Error_Rate',
            9:   'Power_On_Hours',
            12:  'Power_Cycle_Count',
            194: 'Temperature_Celsius',
            199: 'UDMA_CRC_Error_Count',
            200: 'Multi_Zone_Error_Rate',
            233: 'Media_Wearout_Indicator',
        };

        function setStatus(msg, loading) {
            var el = document.getElementById('statusMsg');
            if (loading) {
                el.innerHTML = '<span class="spinner"></span>' + escapeHtml(msg);
            } else {
                el.textContent = msg;
            }
            document.getElementById('refreshBtn').disabled = loading;
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function loadData() {
            setStatus('Hämtar SMART-data…', true);
            document.getElementById('content').innerHTML = '';

            var cockpitAvailable = (typeof cockpit !== 'undefined' && cockpit.spawn);

            if (cockpitAvailable) {
                // Load history first, then current data
                loadHistory(function() {
                    var proc = cockpit.spawn(
                        ["bash", "/usr/share/cockpit/cockpit-smart/scripts/smart-collect.sh"],
                        { superuser: "try", err: "message" }
                    );
                    proc.done(function(output) {
                        try {
                            var data = JSON.parse(output);
                            renderDisks(data);
                            setStatus('Uppdaterad ' + new Date().toLocaleTimeString('sv-SE'), false);
                        } catch(e) {
                            showError('Kunde inte tolka SMART-data: ' + e.message);
                            setStatus('Fel vid tolkning', false);
                        }
                    });
                    proc.fail(function(ex) {
                        showError('Kunde inte hämta SMART-data: ' + (ex.message || ex.toString()));
                        setStatus('Fel vid hämtning', false);
                    });
                });
            } else {
                // Standalone test mode — use mock data
                setTimeout(function() {
                    historyData = getMockHistory();
                    renderDisks(getMockData());
                    setStatus('Testdata (ingen Cockpit-anslutning)', false);
                }, 500);
            }
        }

        function loadHistory(callback) {
            var proc = cockpit.spawn(
                ["cat", "/var/log/smart-history.json"],
                { superuser: "try", err: "message" }
            );
            proc.done(function(output) {
                historyData = parseJsonl(output);
                callback();
            });
            proc.fail(function() {
                // No history file yet — that's fine
                historyData = [];
                callback();
            });
        }

        function parseJsonl(text) {
            var records = [];
            var lines = text.trim().split('\n');
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;
                try {
                    records.push(JSON.parse(line));
                } catch(e) {
                    // Skip malformed lines
                }
            }
            return records;
        }

        function showError(msg) {
            document.getElementById('content').innerHTML =
                '<div class="error-msg">' + escapeHtml(msg) + '</div>';
        }

        function renderDisks(disks) {
            var container = document.getElementById('content');
            container.innerHTML = '';

            if (!disks || disks.length === 0) {
                container.innerHTML = '<p>Inga diskar hittades.</p>';
                return;
            }

            var grid = document.createElement('div');
            grid.className = 'disk-grid';

            disks.forEach(function(disk, idx) {
                grid.appendChild(createDiskCard(disk, idx));
            });

            container.appendChild(grid);
        }

        function createDiskCard(disk, idx) {
            var card = document.createElement('div');
            card.className = 'disk-card';

            // Header
            var header = document.createElement('div');
            header.className = 'disk-header';

            var titleDiv = document.createElement('div');
            titleDiv.style.minWidth = '0';
            titleDiv.style.overflow = 'hidden';
            var title = document.createElement('h3');
            title.className = 'disk-title';
            title.textContent = disk.model || disk.device;
            title.title = disk.model || disk.device;
            if (disk.type) {
                var typeBadge = document.createElement('span');
                typeBadge.className = 'disk-type-badge';
                typeBadge.textContent = disk.type;
                title.appendChild(typeBadge);
            }
            titleDiv.appendChild(title);

            var deviceLine = document.createElement('div');
            deviceLine.className = 'disk-device';
            deviceLine.textContent = disk.device;
            titleDiv.appendChild(deviceLine);

            header.appendChild(titleDiv);

            // Health badge
            var badge = document.createElement('span');
            if (disk.healthy === true) {
                badge.className = 'health-badge health-passed';
                badge.innerHTML = '&#10003; PASSED';
            } else if (disk.healthy === false) {
                badge.className = 'health-badge health-failed';
                badge.innerHTML = '&#10007; FAILED';
            } else {
                badge.className = 'health-badge health-unknown';
                badge.textContent = '? Okänd';
            }
            header.appendChild(badge);
            card.appendChild(header);

            // Info grid
            var info = disk.info || {};
            var infoKeys = Object.keys(info);
            if (infoKeys.length > 0) {
                var dl = document.createElement('dl');
                dl.className = 'info-grid';
                infoKeys.forEach(function(key) {
                    var dt = document.createElement('dt');
                    dt.textContent = key;
                    dl.appendChild(dt);
                    var dd = document.createElement('dd');
                    dd.textContent = info[key];
                    dd.title = info[key];
                    dl.appendChild(dd);
                });
                card.appendChild(dl);
            }

            // Attributes
            var attrs = disk.attributes || [];
            if (attrs.length > 0) {
                if (disk.type === 'NVMe') {
                    card.appendChild(renderNvmeAttrs(attrs));
                } else {
                    card.appendChild(renderSataAttrs(attrs, idx));
                }
            }

            // Changes / trend section
            if (historyData && historyData.length > 0) {
                var changesSection = renderChanges(disk, historyData);
                if (changesSection) {
                    card.appendChild(changesSection);
                }
            }

            // Error
            if (disk.error) {
                var errDiv = document.createElement('div');
                errDiv.className = 'error-msg';
                errDiv.textContent = disk.error;
                card.appendChild(errDiv);
            }

            return card;
        }

        function renderNvmeAttrs(attrs) {
            var section = document.createElement('div');
            var title = document.createElement('p');
            title.className = 'attr-section-title';
            title.textContent = 'NVMe Attribut';
            section.appendChild(title);

            var grid = document.createElement('div');
            grid.className = 'nvme-kv';

            attrs.forEach(function(attr) {
                var item = document.createElement('div');
                item.className = 'nvme-kv-item';

                var label = document.createElement('span');
                label.className = 'kv-label';
                label.textContent = attr.name;

                var value = document.createElement('span');
                value.className = 'kv-value';
                value.textContent = attr.raw;

                // Highlight warnings
                if (attr.name === 'Media and Data Integrity Errors') {
                    var num = parseInt(attr.raw);
                    if (num > 0) value.classList.add('attr-warn');
                }
                if (attr.name === 'Critical Warning') {
                    if (attr.raw !== '0x00' && attr.raw !== '0') {
                        value.classList.add('attr-warn');
                    }
                }

                item.appendChild(label);
                item.appendChild(value);
                grid.appendChild(item);
            });

            section.appendChild(grid);
            return section;
        }

        function renderSataAttrs(attrs, diskIdx) {
            var section = document.createElement('div');

            // Split into critical/important and rest
            var critical = [];
            var important = [];
            var other = [];

            attrs.forEach(function(attr) {
                if (CRITICAL_ATTRS[attr.id]) {
                    critical.push(attr);
                } else if (IMPORTANT_ATTRS[attr.id]) {
                    important.push(attr);
                } else {
                    other.push(attr);
                }
            });

            var keyAttrs = critical.concat(important);

            if (keyAttrs.length > 0) {
                var title = document.createElement('p');
                title.className = 'attr-section-title';
                title.textContent = 'Nyckelattribut';
                section.appendChild(title);
                section.appendChild(createAttrTable(keyAttrs, true));
            }

            if (other.length > 0) {
                var toggleId = 'toggle-' + diskIdx;
                var btn = document.createElement('button');
                btn.className = 'attr-toggle';
                btn.id = toggleId;
                btn.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 3l5 5-5 5V3z"/></svg> Visa alla attribut (' + other.length + ')';
                btn.onclick = function() {
                    var details = document.getElementById('details-' + diskIdx);
                    var expanded = details.classList.toggle('show');
                    btn.classList.toggle('expanded', expanded);
                };
                section.appendChild(btn);

                var details = document.createElement('div');
                details.className = 'attr-details';
                details.id = 'details-' + diskIdx;
                details.appendChild(createAttrTable(other, false));
                section.appendChild(details);
            }

            return section;
        }

        function createAttrTable(attrs, highlight) {
            var wrapper = document.createElement('div');
            wrapper.className = 'attr-table-wrapper';

            var table = document.createElement('table');
            table.className = 'attr-table';

            var colgroup = document.createElement('colgroup');
            colgroup.innerHTML = '<col class="col-id"><col class="col-attr"><col class="col-num"><col class="col-num"><col class="col-num"><col class="col-raw">';
            table.appendChild(colgroup);

            var thead = document.createElement('thead');
            thead.innerHTML = '<tr><th>ID</th><th>Attribut</th><th>Värde</th><th>Sämsta</th><th>Tröskel</th><th>Råvärde</th></tr>';
            table.appendChild(thead);

            var tbody = document.createElement('tbody');
            attrs.forEach(function(attr) {
                var tr = document.createElement('tr');

                // Highlight critical attributes with non-zero raw values
                var isCritical = !!CRITICAL_ATTRS[attr.id];
                var rawNum = parseInt(attr.raw);
                if (isCritical && rawNum > 0 && attr.id !== 9 && attr.id !== 12) {
                    tr.className = 'attr-highlight';
                }

                // Warn if value approaching threshold
                if (attr.thresh && attr.value <= attr.thresh) {
                    tr.className = 'attr-highlight';
                }

                tr.innerHTML =
                    '<td>' + escapeHtml(String(attr.id || '')) + '</td>' +
                    '<td>' + escapeHtml(attr.name || '') + '</td>' +
                    '<td>' + escapeHtml(String(attr.value || '')) + '</td>' +
                    '<td>' + escapeHtml(String(attr.worst || '')) + '</td>' +
                    '<td>' + escapeHtml(String(attr.thresh || '')) + '</td>' +
                    '<td>' + escapeHtml(String(attr.raw || '')) + '</td>';

                if (attr.when_failed) {
                    var cells = tr.querySelectorAll('td');
                    if (cells.length > 0) {
                        cells[cells.length - 1].innerHTML += ' <span class="attr-warn">(FAILED: ' + escapeHtml(attr.when_failed) + ')</span>';
                    }
                }

                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            wrapper.appendChild(table);
            return wrapper;
        }

        // --- Trend detection and rendering ---

        function getDeviceHistory(device, records) {
            // Extract attribute snapshots for a specific device across all records
            var snapshots = [];
            for (var i = 0; i < records.length; i++) {
                var rec = records[i];
                var disks = rec.disks || [];
                for (var j = 0; j < disks.length; j++) {
                    if (disks[j].device === device) {
                        snapshots.push({
                            timestamp: rec.timestamp,
                            attributes: disks[j].attributes || []
                        });
                        break;
                    }
                }
            }
            return snapshots;
        }

        function parseNumeric(str) {
            // Extract numeric value from strings like "100%", "46 Celsius", "0x00", "892"
            if (typeof str === 'number') return str;
            if (typeof str !== 'string') return null;
            str = str.trim();
            if (str.indexOf('0x') === 0) return parseInt(str, 16);
            var match = str.match(/^[\d,]+(\.\d+)?/);
            if (match) return parseFloat(match[0].replace(/,/g, ''));
            return null;
        }

        function getAttrTimeSeries(snapshots, matchFn) {
            // Build time series for an attribute using a match function
            var series = [];
            for (var i = 0; i < snapshots.length; i++) {
                var attrs = snapshots[i].attributes;
                for (var j = 0; j < attrs.length; j++) {
                    if (matchFn(attrs[j])) {
                        series.push({
                            timestamp: snapshots[i].timestamp,
                            attr: attrs[j]
                        });
                        break;
                    }
                }
            }
            return series;
        }

        function detectChanges(currentDisk, records) {
            var changes = [];
            var snapshots = getDeviceHistory(currentDisk.device, records);
            if (snapshots.length === 0) return changes;

            var prev = snapshots[snapshots.length - 1];
            var isNvme = currentDisk.type === 'NVMe';
            var currentAttrs = currentDisk.attributes || [];

            if (isNvme) {
                // NVMe: compare all attributes by name, flag numeric changes
                currentAttrs.forEach(function(cur) {
                    var prevAttr = null;
                    for (var i = 0; i < prev.attributes.length; i++) {
                        if (prev.attributes[i].name === cur.name) {
                            prevAttr = prev.attributes[i];
                            break;
                        }
                    }
                    if (!prevAttr) return;

                    var curVal = parseNumeric(cur.raw);
                    var prevVal = parseNumeric(prevAttr.raw);
                    if (curVal === null || prevVal === null) return;
                    if (curVal === prevVal) return;

                    var diff = curVal - prevVal;
                    var diffStr = (diff > 0 ? '+' : '') + diff;

                    // Determine severity
                    var severity = 'info';
                    var name = cur.name;
                    if (name === 'Available Spare' && diff < 0) severity = 'warn';
                    if (name === 'Percentage Used' && diff > 0) severity = 'warn';
                    if (name === 'Media and Data Integrity Errors' && diff > 0) severity = 'danger';
                    if (name === 'Unsafe Shutdowns' && diff > 0) severity = 'warn';

                    // Build sparkline data
                    var series = getAttrTimeSeries(snapshots, function(a) { return a.name === cur.name; });
                    var sparkData = series.map(function(s) { return parseNumeric(s.attr.raw); }).filter(function(v) { return v !== null; });
                    sparkData.push(curVal);

                    changes.push({
                        name: cur.name,
                        severity: severity,
                        detail: prevAttr.raw + ' → ' + cur.raw + ' (' + diffStr + ')',
                        sparkData: sparkData.slice(-30)
                    });
                });
            } else {
                // SATA: check all attributes generically
                currentAttrs.forEach(function(cur) {
                    var prevAttr = null;
                    for (var i = 0; i < prev.attributes.length; i++) {
                        if (prev.attributes[i].id === cur.id) {
                            prevAttr = prev.attributes[i];
                            break;
                        }
                    }
                    if (!prevAttr) return;

                    var curRaw = parseNumeric(cur.raw);
                    var prevRaw = parseNumeric(prevAttr.raw);

                    // Check 1: raw value changed (exclude Power_On_Hours and Power_Cycle_Count by checking value stability)
                    var rawChanged = (curRaw !== null && prevRaw !== null && curRaw !== prevRaw);

                    // Check 2: value dropped
                    var valueDrop = (cur.value < prevAttr.value);

                    // Check 3: value approaching threshold
                    var nearThresh = (cur.thresh > 0 && cur.value < cur.thresh * 2);

                    if (!rawChanged && !valueDrop && !nearThresh) return;

                    var severity = 'info';
                    var details = [];

                    if (rawChanged) {
                        var rawDiff = curRaw - prevRaw;
                        var rawDiffStr = (rawDiff > 0 ? '+' : '') + rawDiff;
                        details.push('raw: ' + prevAttr.raw + ' → ' + cur.raw + ' (' + rawDiffStr + ')');
                        // Increased raw on critical attrs is more serious
                        if (CRITICAL_ATTRS[cur.id] && rawDiff > 0) severity = 'danger';
                    }

                    if (valueDrop) {
                        var valDiff = cur.value - prevAttr.value;
                        details.push('value: ' + prevAttr.value + ' → ' + cur.value + ' (' + valDiff + ')');
                        severity = (severity === 'danger') ? 'danger' : 'warn';
                    }

                    if (nearThresh) {
                        details.push('närmar sig tröskel (' + cur.value + '/' + cur.thresh + ')');
                        severity = 'danger';
                    }

                    // Sparkline data for the raw value
                    var series = getAttrTimeSeries(snapshots, function(a) { return a.id === cur.id; });
                    var sparkData = series.map(function(s) { return parseNumeric(s.attr.raw); }).filter(function(v) { return v !== null; });
                    sparkData.push(curRaw !== null ? curRaw : 0);

                    changes.push({
                        name: cur.name,
                        severity: severity,
                        detail: details.join(', '),
                        sparkData: sparkData.slice(-30)
                    });
                });
            }

            // Sort: danger first, then warn, then info
            var severityOrder = { danger: 0, warn: 1, info: 2 };
            changes.sort(function(a, b) {
                return (severityOrder[a.severity] || 3) - (severityOrder[b.severity] || 3);
            });

            return changes;
        }

        function renderChanges(disk, records) {
            var section = document.createElement('div');
            section.className = 'changes-section';

            var title = document.createElement('p');
            title.className = 'attr-section-title';
            title.textContent = 'Förändringar';
            section.appendChild(title);

            var changes = detectChanges(disk, records);

            if (changes.length === 0) {
                var noChanges = document.createElement('div');
                noChanges.className = 'no-changes';
                noChanges.textContent = 'Inga förändringar sedan senaste mätning.';
                section.appendChild(noChanges);
            } else {
                changes.forEach(function(change) {
                    var item = document.createElement('div');
                    item.className = 'change-item';

                    var icon = document.createElement('span');
                    icon.className = 'change-icon ' + change.severity;
                    icon.textContent = change.severity === 'danger' ? '!' : change.severity === 'warn' ? '~' : 'i';
                    item.appendChild(icon);

                    var text = document.createElement('span');
                    text.className = 'change-text';
                    text.innerHTML = '<span class="attr-name">' + escapeHtml(change.name) + '</span> <span class="change-detail">' + escapeHtml(change.detail) + '</span>';
                    item.appendChild(text);

                    if (change.sparkData && change.sparkData.length >= 2) {
                        item.appendChild(createSparkline(change.sparkData));
                    }

                    section.appendChild(item);
                });
            }

            // History info
            var snapshots = getDeviceHistory(disk.device, records);
            if (snapshots.length > 0) {
                var statusDiv = document.createElement('div');
                statusDiv.className = 'history-status';
                var oldest = snapshots[0].timestamp.substring(0, 10);
                var newest = snapshots[snapshots.length - 1].timestamp.substring(0, 10);
                statusDiv.textContent = 'Historik: ' + snapshots.length + ' mätningar (' + oldest + ' – ' + newest + ')';
                section.appendChild(statusDiv);
            }

            return section;
        }

        function createSparkline(data) {
            var width = 60;
            var height = 20;
            var padding = 2;

            var min = data[0], max = data[0];
            for (var i = 1; i < data.length; i++) {
                if (data[i] < min) min = data[i];
                if (data[i] > max) max = data[i];
            }

            // Avoid flat line at exact zero range
            if (max === min) { max = min + 1; }

            var points = [];
            var areaPoints = [];
            var stepX = (width - padding * 2) / (data.length - 1);

            for (var i = 0; i < data.length; i++) {
                var x = padding + i * stepX;
                var y = height - padding - ((data[i] - min) / (max - min)) * (height - padding * 2);
                points.push(x.toFixed(1) + ',' + y.toFixed(1));
                areaPoints.push(x.toFixed(1) + ',' + y.toFixed(1));
            }

            // Close area polygon
            areaPoints.push((padding + (data.length - 1) * stepX).toFixed(1) + ',' + (height - padding));
            areaPoints.push(padding.toFixed(1) + ',' + (height - padding));

            var lastX = padding + (data.length - 1) * stepX;
            var lastY = height - padding - ((data[data.length - 1] - min) / (max - min)) * (height - padding * 2);

            var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'sparkline');
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);

            var area = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            area.setAttribute('class', 'spark-area');
            area.setAttribute('points', areaPoints.join(' '));
            svg.appendChild(area);

            var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            polyline.setAttribute('points', points.join(' '));
            svg.appendChild(polyline);

            var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', lastX.toFixed(1));
            dot.setAttribute('cy', lastY.toFixed(1));
            dot.setAttribute('r', '2');
            svg.appendChild(dot);

            // Tooltip
            svg.innerHTML = '<title>' + data.join(', ') + '</title>' + svg.innerHTML;

            return svg;
        }

        function getMockHistory() {
            // Simulate 5 days of history with gradual changes
            var base = getMockData();
            var records = [];
            for (var day = 5; day >= 1; day--) {
                var d = new Date();
                d.setDate(d.getDate() - day);
                var ts = d.toISOString().replace(/\.\d+Z/, 'Z');
                var snapshot = JSON.parse(JSON.stringify(base));
                // Simulate changing values over time
                snapshot.forEach(function(disk) {
                    disk.attributes.forEach(function(attr) {
                        if (attr.id === 9) { // Power_On_Hours
                            attr.raw = String(parseInt(attr.raw) - day * 24);
                        }
                        if (attr.id === 194) { // Temperature
                            attr.raw = String(parseInt(attr.raw) - day + 3);
                        }
                        if (attr.id === 5 && disk.device === '/dev/sdb') { // Simulate realloc growth
                            attr.raw = String(Math.max(0, parseInt(attr.raw) - 2));
                        }
                        if (attr.name === 'Power On Hours') {
                            attr.raw = String(parseInt(attr.raw) - day * 24);
                        }
                        if (attr.name === 'Percentage Used') {
                            var v = parseInt(attr.raw) - 1;
                            attr.raw = (v > 0 ? v : 0) + '%';
                        }
                    });
                });
                records.push({ timestamp: ts, disks: snapshot });
            }
            return records;
        }
